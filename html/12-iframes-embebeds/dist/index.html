<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Learning Resources</title>
</head>
<body>

    <header>
        <h1>HTTP Learning Resources</h1>

        <p>
            Explore videos, maps, secure embedded content, and PDF resources about HTTP and web technologies.
        </p>
    </header>

    <main>

        <section>

            <h2>HTTP Video Tutorial</h2>

            <iframe
                width="560"
                height="315"
                src="https://www.youtube.com/embed/iYM2zFP3Zn0"
                title="HTTP Tutorial Video"
                loading="lazy"
                allowfullscreen
            ></iframe>

        </section>

        <hr>

        <section>

            <h2>Google Maps Location</h2>

            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3825.719438240775!2d-68.119293!3d-16.489689"
                width="600"
                height="450"
                style="border:0;"
                loading="lazy"
                title="Google Maps Location"
                allowfullscreen
            ></iframe>

        </section>

        <hr>

        <section>

            <h2>Sandboxed Embedded Content</h2>

            <iframe
                src="https://example.com"
                width="600"
                height="300"
                title="Sandboxed Example Content"
                loading="lazy"
                sandbox="allow-scripts"
            ></iframe>

        </section>

        <hr>

        <section>

            <h2>Embedded PDF Resource</h2>

            <embed
                src="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
                type="application/pdf"
                width="600"
                height="500"
            >

        </section>

    </main>

    <footer>

        <p>
            &copy; 2025 HTTP Learning Resources
        </p>

    </footer>

</body>
</html>
